<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Berug0</title>
  <link rel="icon" href="/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    ::selection { background: #34d399; color: #0f172a; }
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-slate-300 min-h-screen flex flex-col">
  <div id="navbar"></div>

  <main class="flex-1 flex items-center justify-center px-6">
    <div class="text-center relative">
      <div class="absolute inset-0 -z-10">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-emerald-500/5 rounded-full blur-3xl"></div>
      </div>
      <div class="text-8xl sm:text-9xl font-bold bg-gradient-to-b from-white/20 to-white/5 bg-clip-text text-transparent select-none">
        404
      </div>
      <h1 class="mt-4 text-2xl font-bold text-white">Page not found</h1>
      <p class="mt-3 text-slate-400 max-w-md mx-auto">
        The page you're looking for doesn't exist or has been moved.
      </p>
      <a href="/"
         class="inline-flex items-center gap-2 mt-8 px-6 py-3 rounded-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-semibold text-sm transition-colors duration-300 no-underline">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to home
      </a>
    </div>
  </main>

  <div id="footer"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/js/components.js"></script>
  <script>
    $(function(){
      renderNavbar('#navbar');
      renderFooter('#footer');
    });
  </script>
</body>
</html>
